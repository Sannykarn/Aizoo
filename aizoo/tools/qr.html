<!DOCTYPE html>
<html>

<head>
<title>Dynamic QR Generator | Aizoo</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:60px;
}

input{
width:300px;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#38bdf8;
border:none;
color:white;
cursor:pointer;
}

img{
margin-top:20px;
}

</style>

</head>

<body>

<h1>Dynamic QR Code Generator</h1>

<p>Paste a link to generate QR code</p>

<input id="url" placeholder="https://example.com">

<br>

<button onclick="generateQR()">Generate QR</button>

<br>

<img id="qr">

<br><br>

<button id="downloadBtn" style="display:none;" onclick="downloadQR()">Download QR</button>

<script>

function downloadQR() {

let img = document.getElementById("qr");
let imageURL = img.src;

fetch(imageURL)
.then(response => response.blob())
.then(blob => {

let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "aizoo-qr.png";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

});

}
  function downloadQR(){

let img = document.getElementById("qr");

let imageURL = img.src;

let link = document.createElement("a");
link.href = imageURL;
link.download = "aizoo-qr.png";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

}

</script>

</body>

</html>
